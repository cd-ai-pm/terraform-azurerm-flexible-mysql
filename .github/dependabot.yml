version: 2
updates:
  - package-ecosystem: "terraform"
    directory: "/"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    labels: [ "chore", "dependencies" ]
    commit-message: { prefix: "chore(deps)" }
    groups:
      major-upgrades:
        update-types: [ "major" ]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    labels: [ "chore", "dependencies" ]
    commit-message: { prefix: "chore(deps)" }
    groups:
      major-upgrades:
        update-types: [ "major" ]
